# =============================================
# Servidor
# =============================================
server.port=3000

# =============================================
# Banco de Dados - SQLite
# =============================================
spring.datasource.url=jdbc:sqlite:./maternidade.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================================
# JWT
# =============================================
jwt.access-token-secret=sua_chave_secreta_access_token_muito_longa_e_segura
jwt.refresh-token-secret=sua_chave_secreta_refresh_token_muito_longa_e_segura
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=86400000

# =============================================
# Google OAuth2
# =============================================
google.client-id=371489135-rcgaffospvilhdff34dr7fo2ae8f88qd.apps.googleusercontent.com

# =============================================
# CORS
# =============================================
cors.allowed-origins=*

# =============================================
# SpringDoc / Swagger UI
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
